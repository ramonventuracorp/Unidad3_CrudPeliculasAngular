<div class="container">
    <!-- MODAL -->
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal" (click)="abrirModalGuardarPelicula()">
        Agregar pelicula
    </button>

    <!-- Modal -->
    <div class="modal fade" id="modalPeliculas" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">{{accionModal}} Pelicula</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="nombrePelicula" class="form-label">Nombre: </label>
                                <input type="text" class="form-control" id="nombrePelicula"
                                    [(ngModel)]="nombrePelicula">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="sinopsisPelicula" class="form-label">Sinopsis: </label>
                                <input type="text" class="form-control" id="sinopsisPelicula"
                                    [(ngModel)]="sinopsisPelicula">
                            </div>
                        </div>
                        <div class="col-md-12">
                            <div class="mb-3">
                                <label class="form-label">Categoria: </label>
                                <select class="form-select" aria-label="Seleccione una categoria" [(ngModel)]="categoriaId">
                                    <option *ngFor="let categoria of categorias" [value]="categoria.id">
                                        {{ categoria.nombre }}
                                    </option>
                                </select>
                            </div>

                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="nombrePelicula" class="form-label">FechaEstreno: </label>
                                <input type="date" class="form-control" id="nombrePelicula"
                                    [(ngModel)]="fechaEstrenoPelicula">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="sinopsisPelicula" class="form-label">Puntuacion: </label>
                                <input type="number" class="form-control" id="sinopsisPelicula"
                                    [(ngModel)]="puntuacionPelicula">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-primary" (click)="guardarPelicula()">Guardar</button>
                </div>
            </div>
        </div>
    </div>
    <!-- FIN MODAL -->


    <table class="table">
        <thead>
            <tr>
                <th scope="col">Id</th>
                <th scope="col">Nombre</th>
                <th scope="col">Sinopsis</th>
                <th scope="col">FechaEstreno</th>
                <th scope="col">Puntuacion</th>
                <th scope="col"> Activo</th>
                <th scope="col">Accion</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let pelicula of peliculas ">
                <td>{{pelicula.id}}</td>
                <td>{{pelicula.nombre}}</td>
                <td>{{pelicula.sinopsis}}</td>
                <td>{{pelicula.fechaEstreno}}</td>
                <td>{{pelicula.puntuacion}}</td>
                <td>{{pelicula.activo}}</td>
                <td><button type="button" class="btn btn-primary" (click)="asignandoValoresEnModalParaActualizar(pelicula)">Actualizar</button></td>
            </tr>
        </tbody>
    </table>
</div>
